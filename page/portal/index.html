<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - PA System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../function/shared/css/fonts.css">
    <!-- Admin Portal CSS -->
    <link rel="stylesheet" href="../../function/portal/css/admin-base.css">
    <link rel="stylesheet" href="../../function/portal/css/vfc-modal.css">
    <script src="../../function/portal/components/admin-nav.js"></script>
</head>

<body class="bg-white min-h-screen">

    <!-- Admin Navigation (rendered by component) -->
    <div id="adminNavContainer" data-admin-nav="home"></div>



    <!-- Main Content -->
    <div class="admin-content">

        <!-- Floating Tab Bar + Hamburger wrapper -->
        <div class="tab-bar-wrapper"
            style="margin:0 auto 16px;display:flex;align-items:center;gap:8px;max-width:calc(100% - 16px);width:fit-content;z-index:1000;position:relative">
            <div class="tab-bar" id="homeTabBar"
                style="flex:1;min-width:0;min-height:46px;box-sizing:border-box;background:rgba(255,255,255,0.9);backdrop-filter:blur(20px);border-radius:9999px;padding:4px;box-shadow:0 4px 20px -3px rgba(0,0,0,0.1);border:1px solid rgba(229,231,235,0.8);overflow-x:auto">

                <button class="tab-btn active">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1" />
                    </svg>
                    หน้าแรก
                </button>

            </div>
            <button class="tab-hamburger" onclick="toggleAdminMobileMenu()" title="เมนู">
                <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </div>

        <div class="flex items-center justify-center" style="min-height:60vh">
            <div class="text-center">
                <h1 class="text-2xl font-bold text-gray-900">Admin Portal</h1>
            </div>
        </div>
    </div>

    <script>
        // Auth check — logout() is provided by admin-nav.js, do NOT redeclare here
        const user = sessionStorage.getItem('user');
        if (!user) {
            window.location.href = '../home/main/pam.html';
        }
        // Dead code removed: toggleSearch(), toggleNotifications(), markAllRead(),
        // and click listener — these referenced non-existent DOM elements causing
        // TypeError on every click. logout() moved exclusively to admin-nav.js.
    </script>

</body>

</html>
